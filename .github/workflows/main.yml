name: Weekly Data Ingest

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing data"
        required: false
        default: "true"
  schedule:
    - cron: "0 0 * * 1"

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest job
        run: |
          python ingest.py \
            --dry-run=${{ inputs.dry_run || 'false' }}
